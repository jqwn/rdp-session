name: Release Windows Binaries

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate release contract
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      release_tag: ${{ steps.validate.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate versions and tag
        id: validate
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          python_version = pyproject["project"]["version"]

          cargo_text = pathlib.Path("Cargo.toml").read_text()
          cargo_match = re.search(r'(?m)^version = "([^"]+)"$', cargo_text)
          if not cargo_match:
              raise SystemExit("Cargo.toml version was not found")
          cargo_version = cargo_match.group(1)

          if python_version != cargo_version:
              raise SystemExit(
                  f"version mismatch: pyproject {python_version}, Cargo.toml {cargo_version}"
              )
          if not re.fullmatch(r"[0-9]+[.][0-9]+[.][0-9]+", python_version):
              raise SystemExit(
                  f"release version must be stable X.Y.Z, got {python_version!r}"
              )

          expected_tag = f"v{python_version}"
          event_name = os.environ["EVENT_NAME"]
          if event_name == "release":
              actual_tag = os.environ["RELEASE_TAG"]
              if actual_tag != expected_tag:
                  raise SystemExit(f"release tag must be {expected_tag}, got {actual_tag}")
          elif event_name == "push":
              actual_tag = os.environ["REF_NAME"]
              if actual_tag != expected_tag:
                  raise SystemExit(f"pushed tag must be {expected_tag}, got {actual_tag}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={python_version}", file=output)
              print(f"release_tag={expected_tag}", file=output)
          PY

  test-python:
    name: Test Python package (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build and install wheel
        run: |
          python -m pip wheel . --no-deps -w dist-python
          python -m pip install dist-python/*.whl

      - name: Verify installed package and tests
        env:
          EXPECTED_VERSION: ${{ needs.validate.outputs.version }}
          RDP_SESSION_TEST_INSTALLED: "1"
        run: |
          python - <<'PY'
          import importlib.metadata
          import os

          actual = importlib.metadata.version("rdp-session")
          expected = os.environ["EXPECTED_VERSION"]
          if actual != expected:
              raise SystemExit(f"installed package version {actual} != {expected}")
          PY
          python -m unittest discover -s python/tests
          python -m compileall -q python/src

  build-windows:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest
    needs:
      - validate
      - test-python

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare artifact
        id: package
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $exeName = "rdp-session-$env:RELEASE_TAG-windows-${{ matrix.arch }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/rdp-session.exe" "dist/$exeName"
          $hash = (Get-FileHash "dist/$exeName" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $exeName" | Set-Content -Path "dist/$exeName.sha256" -Encoding ascii
          "exe_name=$exeName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdp-session-${{ needs.validate.outputs.release_tag }}-windows-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  publish-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-windows
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rdp-session-${{ needs.validate.outputs.release_tag }}-windows-*
          path: dist
          merge-multiple: true

      - name: Verify release assets
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
        run: |
          python - <<'PY'
          import hashlib
          import os
          import pathlib

          tag = os.environ["RELEASE_TAG"]
          dist = pathlib.Path("dist")
          for arch in ("x86_64", "arm64"):
              exe_name = f"rdp-session-{tag}-windows-{arch}.exe"
              exe_path = dist / exe_name
              checksum_path = dist / f"{exe_name}.sha256"
              if not exe_path.is_file():
                  raise SystemExit(f"missing {exe_path}")
              if not checksum_path.is_file():
                  raise SystemExit(f"missing {checksum_path}")
              expected = checksum_path.read_text(encoding="ascii").split()[0].lower()
              actual = hashlib.sha256(exe_path.read_bytes()).hexdigest()
              if actual != expected:
                  raise SystemExit(f"checksum mismatch for {exe_name}")
          PY

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.release_tag }}
          files: dist/*
