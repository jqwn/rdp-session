name: Release Windows Binaries

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare artifact
        id: package
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $versionName = $env:RELEASE_TAG -replace '[^A-Za-z0-9._-]', '-'
          $exeName = "rdp-session-$versionName-windows-${{ matrix.arch }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/rdp-session.exe" "dist/$exeName"
          "exe_name=$exeName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.exe_name }}
          path: dist/${{ steps.package.outputs.exe_name }}
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/${{ steps.package.outputs.exe_name }}
